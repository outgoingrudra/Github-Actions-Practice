name: Testing Workflow Variables

on:
  workflow_dispatch

env:
  cloud: google-cloud

jobs:
  greeting_job:
    runs-on: ubuntu-latest
    env:
      Greeting: Hello
    steps:
      - name: "Say Hello Rudra  it's Monday"
        run: echo "${{env.Greeting}} ${{env.First_Name}} is using ${{env.cloud}}!"
        env:
          First_Name: Rudra 
